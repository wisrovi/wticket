# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  builder: html

python:
  install:
    - method: pip
      packages:
        - sphinx
        - sphinx_rtd_theme
        - sphinx-copybutton
        - myst-parser
