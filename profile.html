<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mi Perfil - WTicket">
  <meta name="theme-color" content="#6366f1">
  <title>Mi Perfil - WTicket</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>">
</head>
<body>
  <div class="nav-overlay" id="nav-overlay" onclick="toggleMenu()"></div>
  <nav class="navbar">
    <div class="container navbar-container">
      <div class="navbar-left">
        <button class="hamburger" onclick="toggleMenu()" id="hamburger-btn" aria-label="Abrir menú">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a href="index.html" class="navbar-brand">🎫 WTicket</a>
        <div class="navbar-divider"></div>
        <div class="navbar-links">
          <a href="index.html" class="nav-link">Inicio</a>
          <a href="contact.html" class="nav-link">Contacto</a>
          <a href="profile.html" class="nav-link">Mi Perfil</a>
        </div>
      </div>
      <div class="navbar-right">
        <div class="navbar-user">
          <span id="nav-user"></span>
        </div>
        <div class="navbar-divider"></div>
        <button onclick="toggleTheme()" class="theme-toggle" id="theme-toggle" title="Cambiar tema">🌙</button>
        <button onclick="handleLogout()" class="btn btn-secondary btn-sm" aria-label="Cerrar sesión">🚪</button>
      </div>
      <ul class="navbar-nav" id="navbar-nav" style="display: none;">
        <li class="nav-user" id="nav-user-mobile"></li>
        <li><a href="index.html" class="nav-link">Inicio</a></li>
        <li><a href="contact.html" class="nav-link">Contacto</a></li>
        <li><a href="profile.html" class="nav-link">Mi Perfil</a></li>
        <li style="height: 16px;"></li>
        <li><button onclick="toggleTheme()" class="theme-toggle" id="theme-toggle-mobile" title="Cambiar tema">🌙</button></li>
        <li><button onclick="handleLogout()" class="btn btn-secondary btn-sm">Cerrar Sesión</button></li>
      </ul>
    </div>
  </nav>

  <main class="container" style="padding: 40px 20px;">
    <div class="page-header">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
        <div>
          <h1 class="page-title">Mi Perfil</h1>
          <p class="page-subtitle">Gestiona tu información personal</p>
        </div>
        <a href="dashboard.html" class="btn btn-secondary">← Volver al Panel</a>
      </div>
    </div>

    <div style="max-width: 600px; margin: 0 auto;">
      <div class="card" style="margin-bottom: 24px;">
        <div class="card-header">
          <h2 class="card-title">🏅 Mis Logros</h2>
        </div>
        <div class="card-body">
          <div id="achievements-container" style="display: flex; flex-wrap: wrap; gap: 12px;"></div>
        </div>
      </div>

      <div class="card" style="margin-bottom: 24px;">
        <div class="card-header">
          <h2 class="card-title">📝 Cambiar Nombre</h2>
        </div>
        <div class="card-body">
          <form id="name-form" onsubmit="handleUpdateName(event)">
            <div class="form-group">
              <label class="form-label" for="profile-name">Nombre</label>
              <input type="text" id="profile-name" class="form-input" placeholder="Tu nombre" required>
            </div>
            <button type="submit" class="btn btn-primary" id="name-btn">Actualizar Nombre</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">🔐 Cambiar Contraseña</h2>
        </div>
        <div class="card-body">
          <form id="password-form" onsubmit="handleUpdatePassword(event)">
            <div class="form-group">
              <label class="form-label" for="current-password">Contraseña Actual</label>
              <input type="password" id="current-password" class="form-input" placeholder="••••••••" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="new-password">Nueva Contraseña</label>
              <input type="password" id="new-password" class="form-input" placeholder="••••••••" minlength="4" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-password">Confirmar Nueva Contraseña</label>
              <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" minlength="4" required>
            </div>
            <button type="submit" class="btn btn-primary" id="password-btn">Actualizar Contraseña</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 Wisrovi Rodriguez. Todos los derechos reservados.</p>
    <p>WTicket - Sistema de Gestión de Tickets</p>
  </footer>

  <script type="module">
    import API from './js/app.js';
    import Toast from './js/toast.js';
    import { initKeyboardShortcuts } from './js/shortcuts.js';

    function initTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const theme = document.documentElement.getAttribute('data-theme');
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    window.toggleTheme = () => {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon();
    };

    initTheme();

    initKeyboardShortcuts({
      onToggleTheme: () => toggleTheme()
    });

    let currentSession = null;

    async function init() {
      const session = await API.requireAuth(['user'])();
      if (!session) return;
      currentSession = session;
      
      const userHtml = `<span>👤 ${session.name}</span>`;
      document.getElementById('nav-user').innerHTML = userHtml;
      const mobileUser = document.getElementById('nav-user-mobile');
      if (mobileUser) mobileUser.innerHTML = userHtml;
      document.getElementById('profile-name').value = session.name;
      loadAchievements();
    }

    async function loadAchievements() {
      try {
        const { getAchievements } = await import('./js/achievements.js');
        const userTickets = await API.getUserOpenTickets(currentSession.email);
        const userClosed = await API.getUserClosedTickets(currentSession.email);
        
        const user = {
          ticketCount: userTickets.length + userClosed.length,
          resolvedCount: userClosed.length,
          createdAt: currentSession.createdAt,
          daysSinceCreated: Math.floor((Date.now() - currentSession.createdAt) / (1000 * 60 * 60 * 24))
        };
        
        const achievements = getAchievements(user);
        
        const container = document.getElementById('achievements-container');
        container.innerHTML = achievements.map(a => `
          <div style="text-align: center; padding: 12px; border-radius: 8px; background: ${a.unlocked ? 'var(--primary)' : 'var(--gray-200)'}; color: ${a.unlocked ? 'white' : 'var(--gray-500)'}; opacity: ${a.unlocked ? 1 : 0.5}; min-width: 80px;">
            <div style="font-size: 24px; margin-bottom: 4px;">${a.icon}</div>
            <div style="font-size: 12px; font-weight: 600;">${a.name}</div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading achievements:', error);
      }
    }

    window.toggleMenu = () => {
      const nav = document.getElementById('navbar-nav');
      const btn = document.getElementById('hamburger-btn');
      const overlay = document.getElementById('nav-overlay');
      nav.classList.toggle('active');
      btn.classList.toggle('active');
      overlay.classList.toggle('active');
    };

    window.handleUpdateName = async (event) => {
      event.preventDefault();
      const btn = document.getElementById('name-btn');
      const name = document.getElementById('profile-name').value.trim();

      btn.disabled = true;
      btn.innerHTML = 'Actualizando...';

      try {
        const session = await API.validateSession();
        if (!session) throw new Error('No hay sesión activa');

        const success = await API.updateUserName(session.email, name);
        if (success) {
          Toast.success('Nombre actualizado exitosamente');
          const userHtml = `<span>👤 ${name}</span>`;
          document.getElementById('nav-user').innerHTML = userHtml;
          const mobileUser = document.getElementById('nav-user-mobile');
          if (mobileUser) mobileUser.innerHTML = userHtml;
        }
      } catch (error) {
        Toast.error('Error al actualizar el nombre');
        console.error(error);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Actualizar Nombre';
      }
    };

    window.handleUpdatePassword = async (event) => {
      event.preventDefault();
      const btn = document.getElementById('password-btn');
      const currentPass = document.getElementById('current-password').value;
      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;

      if (newPass !== confirmPass) {
        Toast.error('Las contraseñas no coinciden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = 'Actualizando...';

      try {
        const session = await API.validateSession();
        if (!session) throw new Error('No hay sesión activa');

        const success = await API.updateUserPassword(session.email, currentPass, newPass);
        if (success) {
          Toast.success('Contraseña actualizada exitosamente');
          document.getElementById('password-form').reset();
        }
      } catch (error) {
        Toast.error('Error al actualizar la contraseña');
        console.error(error);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Actualizar Contraseña';
      }
    };

    window.handleLogout = async () => {
      if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
        await API.logout();
        Toast.success('Sesión cerrada correctamente');
        setTimeout(() => window.location.href = 'login.html', 1000);
      }
    };

    init();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
