<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inicia sesión o regístrate en WTicket">
  <meta name="theme-color" content="#6366f1">
  <title>Iniciar Sesión - WTicket</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card fade-in">
      <div class="auth-header">
        <div class="auth-logo">🎫</div>
        <h1 class="auth-title">WTicket</h1>
        <p class="auth-subtitle">Sistema de Gestión de Tickets</p>
        <div class="stats-badge" id="stats-badge">
          <span class="stats-badge-icon">✅</span>
          <span><strong id="resolved-count">0</strong> peticiones resueltas</span>
        </div>
        <button onclick="toggleTheme()" class="theme-toggle" id="theme-toggle" title="Cambiar tema" style="margin-top: 12px;">🌙</button>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="login" onclick="switchTab('login')">Iniciar Sesión</button>
        <button class="tab" data-tab="register" onclick="switchTab('register')">Registrarse</button>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Correo Electrónico</label>
          <input type="email" id="login-email" class="form-input" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Contraseña</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          Iniciar Sesión
        </button>
      </form>

      <form id="register-form" style="display: none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="register-name">Nombre</label>
          <input type="text" id="register-name" class="form-input" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label class="form-label" for="register-email">Correo Electrónico</label>
          <input type="email" id="register-email" class="form-input" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="register-password">Contraseña</label>
          <input type="password" id="register-password" class="form-input" placeholder="••••••••" minlength="4" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="register-confirm">Confirmar Contraseña</label>
          <input type="password" id="register-confirm" class="form-input" placeholder="••••••••" minlength="4" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">
          Crear Cuenta
        </button>
      </form>

      <div class="auth-footer">
        <a href="index.html">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script type="module">
    import API from './js/app.js';
    import Toast from './js/toast.js';

    function initTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const theme = document.documentElement.getAttribute('data-theme');
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    window.toggleTheme = () => {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon();
    };

    initTheme();

    function animateValue(element, start, end, duration) {
      if (start === end) return;
      const range = end - start;
      const startTime = performance.now();
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        element.textContent = Math.round(start + range * eased);
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    async function loadStats() {
      try {
        const stats = await API.getStats();
        const el = document.getElementById('resolved-count');
        const current = parseInt(el.textContent) || 0;
        animateValue(el, current, stats.closedCount, 1000);
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const tab = urlParams.get('tab');
    if (tab === 'register') {
      switchTab('register');
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById('login-form').style.display = tabName === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tabName === 'register' ? 'block' : 'none';
    }

    window.switchTab = switchTab;

    function setButtonLoading(btn, loading, text) {
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="loading-spinner"></span> Procesando...' : text;
    }

    async function handleLogin(event) {
      event.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      setButtonLoading(btn, true, 'Iniciar Sesión');
      
      try {
        const result = await API.login(email, password);
        localStorage.setItem('wticket_token', result.token);
        localStorage.setItem('wticket_user', JSON.stringify(result.user));
        Toast.success(`¡Bienvenido, ${result.user.name}!`);
        
        setTimeout(() => {
          window.location.href = result.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }, 1000);
      } catch (error) {
        Toast.error(error.message || 'Error al iniciar sesión');
        setButtonLoading(btn, false, 'Iniciar Sesión');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      const btn = document.getElementById('register-btn');
      const name = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;

      if (password !== confirm) {
        Toast.error('Las contraseñas no coinciden');
        return;
      }

      setButtonLoading(btn, true, 'Creando Cuenta...');

      try {
        console.log('Starting registration for:', email);
        const result = await API.register(email, password, name);
        console.log('Registration successful:', result);
        Toast.success('¡Cuenta creada exitosamente!');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } catch (error) {
        console.error('Registration error:', error);
        Toast.error(error.message || 'Error al crear la cuenta');
        setButtonLoading(btn, false, 'Crear Cuenta');
      }
    }

    window.handleLogin = handleLogin;
    window.handleRegister = handleRegister;

    async function checkSession() {
      const session = await API.validateSession();
      if (session) {
        window.location.href = session.role === 'admin' ? 'admin.html' : 'dashboard.html';
      }
    }
    API.init().then(() => {
      checkSession();
      loadStats();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>

  <footer class="site-footer" style="position: fixed; bottom: 0; width: 100%;">
    <p>© 2026 Wisrovi Rodriguez. Todos los derechos reservados. | <a href="contact.html" style="color: var(--gray-400);">Contacto</a></p>
  </footer>
</body>
</html>
